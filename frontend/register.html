<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - TaskApp</title>
  <link rel="stylesheet" href="css/main.css">
  <script>
    (function(){
      try {
        var token = localStorage.getItem('token');
        if (token) {
          window.location.replace('index.html');
        }
      } catch(e) {}
    })();
  </script>
</head>
<body class="auth-page">
  <div class="auth-card">
    <h2>Tạo tài khoản mới</h2>
    <p>Đăng ký để bắt đầu quản lý công việc và theo dõi tiến độ hiệu quả.</p>

    <form id="registerForm">
      <div class="auth-group">
        <label for="username">Tên đăng nhập</label>
        <input id="username" placeholder="Tên của bạn" required>
      </div>
      <div class="auth-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="email@example.com" required>
      </div>
      <div class="auth-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Tạo mật khẩu" required>
      </div>
      <div class="auth-message" id="msg"></div>
      <button type="submit" class="auth-btn">Đăng ký</button>
    </form>

    <div class="auth-footer">
      <span>Đã có tài khoản?</span>
      <a href="login.html">Đăng nhập</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
